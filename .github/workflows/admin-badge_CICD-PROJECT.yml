name: Deploy monorepo (api + web) to Azure App Service

on:
  push:
    branches:
      - admin/badge
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  WEBAPP_NAME: "CICD-PROJECT"
  RESOURCE_GROUP: "CICD-PROJECT_group"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "deployment.zip"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_3B1308AB21D34754A7B15E6F77C7DAD2 }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_D94C02BEE565489CAB4E6BA0B5448DD0 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_14A3F065463E4E7498F3F3754F15E1A4 }}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
        working-directory: ${{ env.API_DIR }}

      - run: npm ci
        working-directory: ${{ env.WEB_DIR }}

      - run: |
          npx prisma generate
          npm run build
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - run: npx playwright install --with-deps
        working-directory: ${{ env.WEB_DIR }}

      - run: |
          npm start &
          sleep 10
          curl -f http://localhost:5175/health || curl -f http://localhost:5175/ || echo "API server not responding"
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 5175
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          NODE_ENV: test

      - run: npm run e2e
        working-directory: ${{ env.WEB_DIR }}
        env:
          CI: true
          VITE_API_TARGET: http://localhost:5175

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ${{ env.WEB_DIR }}/playwright-report/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
        working-directory: ${{ env.WEB_DIR }}

      - run: npm run build
        working-directory: ${{ env.WEB_DIR }}

      - run: npm ci
        working-directory: ${{ env.API_DIR }}

      - run: npm run build
        working-directory: ${{ env.API_DIR }}

      - run: npm prune --production
        working-directory: ${{ env.API_DIR }}

      - run: |
          rm -rf "${API_DIR}/public"
          mkdir -p "${API_DIR}/public"
          cp -R "${WEB_DIR}/dist/." "${API_DIR}/public/"
      
      - run: |
          if [ -d "${API_DIR}/src/public" ]; then
            cp -R -u "${API_DIR}/src/public/." "${API_DIR}/public/" || true
          fi

      - run: |
          cd "${API_DIR}"
          npm ci --production --ignore-scripts
          rm -rf tests/ *.log coverage/ .git/ .github/ || true

      - run: |
          cd "${API_DIR}"
          zip -r "../${ARTIFACT_NAME}" \
            node_modules/ \
            package*.json \
            prisma/ \
            public/ \
            dist/ \
            *.js \
            web.config \
            generated/ \
            .deployment \
            -x "*.log" "*.test.js" "coverage/*" "node_modules/*/test/*" "node_modules/*/tests/*" \
            || true

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ env.ARTIFACT_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/admin/badge')
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ${{ env.ARTIFACT_NAME }}
          clean: true

      - run: |
          az webapp restart --name ${{ env.WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}
