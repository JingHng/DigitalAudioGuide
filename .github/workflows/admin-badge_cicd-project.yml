name: Deploy badge (api + web) to Azure App Service

on:
  push:
    branches:
      - admin/badge
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  WEBAPP_NAME: "CICD-PROJECT"
  RESOURCE_GROUP: "CICD-PROJECT_group"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_86EE8967028A49F5965DD3913522BD11 }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_C0C0E3446DAE4866BB375773F0F65A87 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2FB091A84E45407EB53EC296B400A658 }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci
        working-directory: ${{ env.WEB_DIR }}

      - run: npm run build
        working-directory: ${{ env.WEB_DIR }}

      - run: |
          rm -rf "${API_DIR}/public"
          mkdir -p "${API_DIR}/public"
          cp -R "${WEB_DIR}/dist/." "${API_DIR}/public/"

      - run: npm ci
        working-directory: ${{ env.API_DIR }}

      - run: npm run build
        working-directory: ${{ env.API_DIR }}

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/admin/badge')
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - run: |
          npm ci
          npx prisma generate
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: .
          clean: true

      - run: |
          az webapp restart --name ${{ env.WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}
