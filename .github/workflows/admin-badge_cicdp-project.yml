name: Deploy badge (api + web) to Azure App Service

on:
  push:
    branches:
      - admin/badge
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  WEBAPP_NAME: "CICD-PROJECT"
  RESOURCE_GROUP: "CICD-PROJECT_group"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "deployment.zip"

  # Ports used in CI for E2E
  API_PORT: "5175"
  WEB_PORT: "5174"

  # Auth secrets used by API in CI
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

  # Azure OIDC
  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_86EE8967028A49F5965DD3913522BD11 }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_C0C0E3446DAE4866BB375773F0F65A87 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2FB091A84E45407EB53EC296B400A658 }}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install API dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Install Web dependencies
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      # The E2E database will be reset, therefore DATABASE_URL_RUYI is required here.
      - name: Resolve reset database URL for E2E
        shell: bash
        run: |
          if [ -z "${{ secrets.DATABASE_URL_RUYI }}" ]; then
            echo "DATABASE_URL_RUYI is required for E2E but not set."
            exit 1
          fi
          echo "DATABASE_URL=${{ secrets.DATABASE_URL_RUYI }}" >> $GITHUB_ENV

      - name: Prisma reset and seed (E2E database)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npx prisma generate
          npx prisma migrate reset --force --skip-seed
          npx prisma migrate deploy
          node prisma/seed.js

      # Ensure server.js can resolve require("./app") in App Service.
      # If the real implementation is under src/app, this shim makes it available at root.
      - name: Create app entry shim for runtime
        working-directory: ${{ env.API_DIR }}
        shell: bash
        run: |
          if [ -f "src/app.js" ] || [ -f "src/app/index.js" ] || [ -f "src/app.cjs" ] || [ -f "src/app.mjs" ]; then
            cat > app.js <<'EOF'
            module.exports = require("./src/app");
            EOF
          else
            # If your project uses a different path/name (e.g., src/app/index.js), adjust the shim accordingly.
            # This fail-fast message prevents shipping a broken runtime package.
            echo "Could not find a supported src/app entry. Expected src/app.js or src/app."
            exit 1
          fi

      - name: Build Web (E2E)
        working-directory: ${{ env.WEB_DIR }}
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright install --with-deps

      - name: Start API server (E2E)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: ${{ env.API_PORT }}
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          NODE_ENV: test
        shell: bash
        run: |
          # Start the API using the package start script
          npm start &
          echo "Waiting for API readiness..."
          for i in {1..30}; do
            if curl -fsS "http://localhost:${API_PORT}/health" >/dev/null 2>&1; then
              echo "API is ready."
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready."
          exit 1

      - name: Start Web server (E2E)
        working-directory: ${{ env.WEB_DIR }}
        shell: bash
        run: |
          npx vite preview --host 127.0.0.1 --port ${WEB_PORT} &
          echo "Waiting for Web readiness..."
          for i in {1..30}; do
            if curl -fsS "http://localhost:${WEB_PORT}" >/dev/null 2>&1; then
              echo "Web is ready."
              exit 0
            fi
            sleep 1
          done
          echo "Web did not become ready."
          exit 1

      - name: Run Playwright E2E tests
        working-directory: ${{ env.WEB_DIR }}
        env:
          CI: true
          API_URL: http://localhost:${{ env.API_PORT }}
          FRONTEND_URL: http://localhost:${{ env.WEB_PORT }}
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.WEB_DIR }}/playwright-report/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install web dependencies
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Build web
        working-directory: ${{ env.WEB_DIR }}
        run: npm run build

      - name: Install api dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      # The production database must not be reset. DATABASE_URL is used here.
      - name: Resolve production database URL
        shell: bash
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL is required for build/production but not set."
            exit 1
          fi
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV

      - name: Prisma generate (no reset)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npx prisma generate

      # Ensure server.js can resolve require("./app") in App Service.
      - name: Create app entry shim for runtime
        working-directory: ${{ env.API_DIR }}
        shell: bash
        run: |
          if [ -f "src/app.js" ] || [ -f "src/app/index.js" ] || [ -f "src/app.cjs" ] || [ -f "src/app.mjs" ]; then
            cat > app.js <<'EOF'
            module.exports = require("./src/app");
            EOF
          else
            echo "Could not find a supported src/app entry. Expected src/app.js or src/app."
            exit 1
          fi

      - name: Prune dev dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm prune --production

      - name: Copy web build into api/public
        shell: bash
        run: |
          rm -rf "${API_DIR}/public"
          mkdir -p "${API_DIR}/public"
          cp -R "${WEB_DIR}/dist/." "${API_DIR}/public/"

      - name: Package deployment artifact
        shell: bash
        run: |
          cd "${API_DIR}"
          rm -f "../${ARTIFACT_NAME}"

          # The runtime package must include server.js, app.js shim, src, prisma, public, and production node_modules.
          zip -r "../${ARTIFACT_NAME}" \
            node_modules/ \
            package*.json \
            prisma/ \
            public/ \
            src/ \
            server.js \
            app.js \
            web.config

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ env.ARTIFACT_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/admin/badge')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ${{ env.ARTIFACT_NAME }}
          clean: true

      - name: Restart web app
        shell: bash
        run: |
          az webapp restart --name "${WEBAPP_NAME}" --resource-group "${RESOURCE_GROUP}"
