name: Deploy badge (api + web) to Azure App Service

on:
  push:
    branches:
      - admin/badge
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  WEBAPP_NAME: "CICD-PROJECT"
  RESOURCE_GROUP: "CICD-PROJECT_group"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "deployment.zip"

  API_PORT: "5175"
  WEB_PORT: "5174"

  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_86EE8967028A49F5965DD3913522BD11 }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_C0C0E3446DAE4866BB375773F0F65A87 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2FB091A84E45407EB53EC296B400A658 }}

  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install API deps
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Install Web deps
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Resolve DATABASE_URL for CI (prefer DATABASE_URL_RUYI)
        shell: bash
        run: |
          DB_URL="${{ secrets.DATABASE_URL_RUYI }}"
          if [ -z "$DB_URL" ]; then
            DB_URL="${{ secrets.DATABASE_URL }}"
          fi
          if [ -z "$DB_URL" ]; then
            echo "❌ No database URL found. Set DATABASE_URL_RUYI (preferred) or DATABASE_URL."
            exit 1
          fi
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV
          echo "✅ DATABASE_URL resolved"

      - name: Prisma reset + migrate + seed (clean CI DB)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        shell: bash
        run: |
          npx prisma generate
          npx prisma migrate reset --force --skip-seed
          npx prisma migrate deploy
          node prisma/seed.js

      - name: Build API
        working-directory: ${{ env.API_DIR }}
        run: npm run build

      - name: Debug tsconfig (why no dist)
        working-directory: ${{ env.API_DIR }}
        shell: bash
        run: |
          echo "---- tsconfig.json ----"
          cat tsconfig.json
          echo "---- tsc showConfig ----"
          npx tsc --showConfig | head -200


      - name: Verify API dist exists
        working-directory: ${{ env.API_DIR }}
        shell: bash
        run: |
          echo "📌 Checking dist exists:"
          ls -la dist/ || (echo "❌ dist/ not found. Fix tsconfig outDir to dist." && exit 1)

      - name: Build Web
        working-directory: ${{ env.WEB_DIR }}
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright install --with-deps

      - name: Start API server (background)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: ${{ env.API_PORT }}
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          NODE_ENV: test
        shell: bash
        run: |
          # Use compiled start in CI too (matches Azure)
          node dist/server.js &
          echo "Waiting for API..."
          for i in {1..30}; do
            if curl -fsS "http://localhost:${API_PORT}/health" >/dev/null 2>&1; then
              echo "✅ API is up"
              exit 0
            fi
            sleep 1
          done
          echo "❌ API did not become ready"
          exit 1

      - name: Start Web server (background)
        working-directory: ${{ env.WEB_DIR }}
        env:
          VITE_API_TARGET: http://localhost:${{ env.API_PORT }}
        shell: bash
        run: |
          npx vite preview --host 127.0.0.1 --port ${WEB_PORT} &
          echo "Waiting for Web..."
          for i in {1..30}; do
            if curl -fsS "http://localhost:${WEB_PORT}" >/dev/null 2>&1; then
              echo "✅ Web is up"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Web did not become ready"
          exit 1

      - name: Run Playwright E2E
        working-directory: ${{ env.WEB_DIR }}
        env:
          CI: true
          VITE_API_TARGET: http://localhost:${{ env.API_PORT }}
          FRONTEND_URL: http://localhost:${{ env.WEB_PORT }}
          API_URL: http://localhost:${{ env.API_PORT }}
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.WEB_DIR }}/playwright-report/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install web deps
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Build web
        working-directory: ${{ env.WEB_DIR }}
        run: npm run build

      - name: Install api deps
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Build api
        working-directory: ${{ env.API_DIR }}
        run: npm run build

      - name: Verify dist exists
        working-directory: ${{ env.API_DIR }}
        shell: bash
        run: |
          echo "📌 Checking dist exists:"
          ls -la dist/ || (echo "❌ dist/ not found. Fix tsconfig outDir to dist." && exit 1)

      - name: Prune dev dependencies (API)
        working-directory: ${{ env.API_DIR }}
        run: npm prune --production

      - name: Copy web build into api/public
        shell: bash
        run: |
          rm -rf "${API_DIR}/public"
          mkdir -p "${API_DIR}/public"
          cp -R "${WEB_DIR}/dist/." "${API_DIR}/public/"
          test -f "${API_DIR}/public/index.html" || (echo "❌ index.html missing in api/public" && exit 1)

      - name: Package deployment artifact
        shell: bash
        run: |
          cd "${API_DIR}"
          rm -f "../${ARTIFACT_NAME}"
          echo "📦 Creating deployment package (api + public)..."
          zip -r "../${ARTIFACT_NAME}" \
            dist/ \
            node_modules/ \
            package*.json \
            prisma/ \
            public/ \
            web.config \
            -x "*.log" "*.test.*" "coverage/*" "node_modules/*/test/*" "node_modules/*/tests/*"
          cd ..
          ls -lh "${ARTIFACT_NAME}"
          unzip -l "${ARTIFACT_NAME}" | head -120

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ env.ARTIFACT_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/heads/admin/badge')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ${{ env.ARTIFACT_NAME }}
          clean: true

      - name: Restart web app
        shell: bash
        run: |
          az webapp restart --name "${WEBAPP_NAME}" --resource-group "${RESOURCE_GROUP}"
          echo "✅ Restarted ${WEBAPP_NAME}"
