name: Deploy badge (api + web) to Azure App Service

on:
  push:
    branches:
      - admin/badge
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  WEBAPP_NAME: "CICD-PROJECT"
  RESOURCE_GROUP: "CICD-PROJECT_group"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "deployment.zip"

  # Ports used in CI for E2E
  API_PORT: "5175"
  WEB_PORT: "5174"

  # Auth secrets
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

  # Azure OIDC
  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_86EE8967028A49F5965DD3913522BD11 }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_C0C0E3446DAE4866BB375773F0F65A87 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2FB091A84E45407EB53EC296B400A658 }}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install API dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Install Web dependencies
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      # Database used here WILL be reset
      - name: Resolve reset database URL (E2E)
        shell: bash
        run: |
          if [ -z "${{ secrets.DATABASE_URL_RUYI }}" ]; then
            echo "DATABASE_URL_RUYI is required for E2E but not set."
            exit 1
          fi
          echo "DATABASE_URL=${{ secrets.DATABASE_URL_RUYI }}" >> $GITHUB_ENV

      - name: Prisma reset and seed (E2E database)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npx prisma generate
          npx prisma migrate reset --force --skip-seed
          npx prisma migrate deploy
          node prisma/seed.js

      # Compile TypeScript without relying on tsconfig.files
      - name: Build API (CI TypeScript compilation)
        working-directory: ${{ env.API_DIR }}
        shell: bash
        run: |
          rm -rf dist
          SRC_FILES=$(find src -type f -name "*.ts")
          if [ -z "$SRC_FILES" ]; then
            echo "No TypeScript files found in api/src."
            exit 1
          fi

          npx tsc \
            --outDir dist \
            --module commonjs \
            --target ES2020 \
            --moduleResolution node \
            --esModuleInterop \
            --skipLibCheck \
            $SRC_FILES

          if [ ! -f dist/server.js ]; then
            echo "dist/server.js not found after compilation."
            exit 1
          fi

          # Create runtime wrapper for Azure (node server.js)
          cat > server.js <<'EOF'
          const path = require("path");
          require(path.join(__dirname, "dist", "server.js"));
          EOF

      - name: Build Web
        working-directory: ${{ env.WEB_DIR }}
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright install --with-deps

      - name: Start API server (E2E)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: ${{ env.API_PORT }}
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          NODE_ENV: test
        run: |
          node dist/server.js &
          for i in {1..30}; do
            curl -fsS http://localhost:${API_PORT}/health && exit 0
            sleep 1
          done
          exit 1

      - name: Start Web server (E2E)
        working-directory: ${{ env.WEB_DIR }}
        run: |
          npx vite preview --host 127.0.0.1 --port ${WEB_PORT} &
          for i in {1..30}; do
            curl -fsS http://localhost:${WEB_PORT} && exit 0
            sleep 1
          done
          exit 1

      - name: Run Playwright E2E tests
        working-directory: ${{ env.WEB_DIR }}
        env:
          CI: true
          API_URL: http://localhost:${{ env.API_PORT }}
          FRONTEND_URL: http://localhost:${{ env.WEB_PORT }}
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.WEB_DIR }}/playwright-report/

  build:
    runs-on: ubuntu-latest
    needs: e2e

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install API dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      # Database used here MUST NOT be reset
      - name: Resolve production database URL
        shell: bash
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "DATABASE_URL is required for build/production."
            exit 1
          fi
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV

      - name: Build API (production)
        working-directory: ${{ env.API_DIR }}
        shell: bash
        run: |
          rm -rf dist
          npx prisma generate

          SRC_FILES=$(find src -type f -name "*.ts")
          npx tsc \
            --outDir dist \
            --module commonjs \
            --target ES2020 \
            --moduleResolution node \
            --esModuleInterop \
            --skipLibCheck \
            $SRC_FILES

          cat > server.js <<'EOF'
          const path = require("path");
          require(path.join(__dirname, "dist", "server.js"));
          EOF

      - name: Prune dev dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm prune --production

      - name: Build Web
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci && npm run build

      - name: Copy web build into API public
        run: |
          rm -rf api/public
          mkdir -p api/public
          cp -R web/dist/. api/public/

      - name: Package deployment artifact
        run: |
          cd api
          zip -r ../${ARTIFACT_NAME} \
            dist \
            node_modules \
            package*.json \
            prisma \
            public \
            server.js \
            web.config

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ env.ARTIFACT_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ${{ env.ARTIFACT_NAME }}
          clean: true

      - name: Restart App Service
        run: |
          az webapp restart \
            --name "${WEBAPP_NAME}" \
            --resource-group "${RESOURCE_GROUP}"