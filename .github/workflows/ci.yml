# .github/workflows/ci.yml

name: CI Pipeline - Full Stack Integration Test

on: [push, pull_request]

jobs:
  # Setup job - prepares database and starts API server
  setup:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    env:
      # Test database configuration
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db?schema=public"
      NODE_ENV: "test"
      PORT: 5175
      VITE_API_TARGET: http://localhost:5175
      JWT_SECRET_KEY: "test-jwt-secret-key-for-ci-testing-only-minimum-64-characters-long-to-meet-security-requirements"
      JWT_EXPIRES_IN: "24h"
      JWT_ALGORITHM: "HS256"
      FRONTEND_URL: "http://localhost:5173"
      
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Backend Setup ---
      - name: 📦 Install API Dependencies
        run: |
          cd api
          npm install

      - name: 🗄️ Setup Database Schema
        run: |
          cd api
          npx prisma migrate deploy

      - name: 🌱 Seed Test Database
        run: |
          cd api
          node prisma/seed.js
        env:
          SEED_DISABLE: 0

      - name: 🔧 Build API (if needed)
        run: |
          cd api
          npm run build

      - name: 🚀 Start API Server
        run: |
          cd api
          echo "Starting API server..."
          npm start > api.log 2>&1 &
          echo "API server process started"
          sleep 5
          echo "API logs after 5 seconds:"
          cat api.log || echo "No log file yet"
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db?schema=public"
          NODE_ENV: "test"
          PORT: 5175
          JWT_SECRET_KEY: "test-jwt-secret-key-for-ci-testing-only-minimum-64-characters-long-to-meet-security-requirements"
          JWT_EXPIRES_IN: "24h"
          JWT_ALGORITHM: "HS256"
          FRONTEND_URL: "http://localhost:5173"

      - name: ⏳ Wait for API to be ready
        run: |
          echo "Waiting for API exhibits endpoint..."
          timeout=60
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -f http://localhost:5175/api/exhibits > /dev/null 2>&1; then
              echo "API server is ready!"
              exit 0
            fi
            echo "Waiting for API... ($counter/$timeout seconds)"
            sleep 2
            counter=$((counter + 2))
          done
            echo "API health check failed. Debugging information:"
            echo "=== API Server Logs ==="
            cat api/api.log || echo "No API log file found"
            echo "=== Process List ==="
            ps aux | grep node || echo "No node processes found"
            echo "=== Port Usage ==="
            netstat -tlnp | grep 5175 || echo "Port 5175 not in use"
            echo "=== Testing basic connectivity ==="
            curl -v http://localhost:5175/ || echo "Server not responding at all"
            echo "=== Testing API base path ==="
            curl -v http://localhost:5175/api/ || echo "API base path not responding"
            exit 1

      # --- Frontend Setup ---
      - name: 📦 Install Web Dependencies
        run: |
          cd web
          npm install
      - name: 🏗️ Build Web (production build)
        run: |
          cd web
          npm run build

      - name: 🌐 Install Playwright Browsers
        run: |
          cd web
          npx playwright install --with-deps

      # --- API Unit Tests (Run before E2E tests) ---
      - name: 🔍 Run API Unit Tests
        run: |
          cd api
          npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db?schema=public"
          NODE_ENV: "test"
          JWT_SECRET_KEY: "test-jwt-secret-key-for-ci-testing-only-minimum-64-characters-long-to-meet-security-requirements"
          JWT_EXPIRES_IN: "24h"
          JWT_ALGORITHM: "HS256"
          FRONTEND_URL: "http://localhost:5173"
        continue-on-error: false  # Fail if tests fail

      # Store API logs for debugging
      - name: 📝 Save API Logs
        if: always()
        run: |
          mkdir -p artifacts
          cp api/api.log artifacts/api.log 2>/dev/null || echo "No API log file found"
        continue-on-error: true

      - name: 💾 Upload API Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: artifacts/api.log
          retention-days: 1
          if-no-files-found: ignore

  # Registration Test Job - Tests user registration flow
  test_registration:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db?schema=public"
      NODE_ENV: "test"
      PORT: 5175
      VITE_API_TARGET: http://localhost:5175
      JWT_SECRET_KEY: "test-jwt-secret-key-for-ci-testing-only-minimum-64-characters-long-to-meet-security-requirements"
      JWT_EXPIRES_IN: "24h"
      JWT_ALGORITHM: "HS256"
      FRONTEND_URL: "http://localhost:5173"
      CI: true
      
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- Backend Setup ---
      - name: 📦 Install API Dependencies
        run: |
          cd api
          npm install

      - name: 🗄️ Setup Database Schema
        run: |
          cd api
          npx prisma migrate deploy

      - name: 🌱 Seed Test Database
        run: |
          cd api
          node prisma/seed.js
        env:
          SEED_DISABLE: 0

      - name: 🚀 Start API Server
        run: |
          cd api
          echo "Starting API server for registration tests..."
          npm start > api.log 2>&1 &
          echo "API server process started (PID: $!)"
          sleep 10
          echo "API logs after 10 seconds:"
          cat api.log || echo "No log file yet"
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db?schema=public"
          NODE_ENV: "test"
          PORT: 5175
          JWT_SECRET_KEY: "test-jwt-secret-key-for-ci-testing-only-minimum-64-characters-long-to-meet-security-requirements"
          JWT_EXPIRES_IN: "24h"
          JWT_ALGORITHM: "HS256"
          FRONTEND_URL: "http://localhost:5173"

      - name: ⏳ Wait for API to be ready
        run: |
          echo "Waiting for API to be ready for registration tests..."
          timeout=60
          counter=0
          while [ $counter -lt $timeout ]; do
            if curl -f http://localhost:5175/api/exhibits > /dev/null 2>&1; then
              echo "API server is ready for registration tests!"
              exit 0
            fi
            echo "Waiting for API... ($counter/$timeout seconds)"
            sleep 2
            counter=$((counter + 2))
          done
          echo "API health check failed for registration tests"
          cat api/api.log || echo "No API log file found"
          exit 1

      # --- Frontend Setup ---
      - name: 📦 Install Web Dependencies
        run: |
          cd web
          npm install
      - name: 🏗️ Build Web (production build)
        run: |
          cd web
          npm run build

      - name: 🌐 Install Playwright Browsers
        run: |
          cd web
          npx playwright install --with-deps

      # --- Registration API Unit Tests ---
      - name: 🔍 Run Registration API Unit Tests
        run: |
          cd api
          npm test -- -t "Registration"
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/test_db?schema=public"
          NODE_ENV: "test"
          JWT_SECRET_KEY: "test-jwt-secret-key-for-ci-testing-only-minimum-64-characters-long-to-meet-security-requirements"
          JWT_EXPIRES_IN: "24h"
          JWT_ALGORITHM: "HS256"
          FRONTEND_URL: "http://localhost:5173"
        continue-on-error: false

      # --- Registration E2E Tests ---
      - name: 🧪 Run Registration E2E Tests
        run: |
          cd web
          npx playwright test tests/e2e/registration.spec.ts
        env:
          VITE_API_TARGET: http://localhost:5175
          CI: true
        continue-on-error: false

      - name: 📝 Upload Registration Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: registration-test-report
          path: web/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      # --- Debug Information (only runs on failure) ---
      - name: 🐛 Debug Registration Tests (on failure)
        if: failure()
        run: |
          echo "=== Registration Test Failure Debug ==="
          echo "=== API Server Logs ==="
          cat api/api.log || echo "No API log file found"
          echo "=== Process List ==="
          ps aux | grep -E "(node|vite)" || echo "No processes found"
          echo "=== Port Usage ==="
          netstat -tlnp | grep -E "(5175|5173)" || echo "Ports not in use"

