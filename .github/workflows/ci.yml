# .github/workflows/ci.yml

name: CI Pipeline - Frontend Test (Quick)

on: [push, pull_request]

jobs:
  test_frontend:
    runs-on: ubuntu-latest
    
    env:
      VITE_API_TARGET: http://localhost:5175 
      
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Web Dependencies
        run: |
          cd web
          npm install

      - name: 🌐 Install Playwright Browsers
        run: |
          cd web
          npx playwright install --with-deps

      # Remove these manual server steps since Playwright handles it:
      # - Start Frontend App 
      # - Wait for Frontend Endpoint
        
      - name: 🧪 Run Playwright Tests (Frontend/Page Load Check)
        run: |
          cd web
          npx playwright test
        
      - name: 📝 Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7