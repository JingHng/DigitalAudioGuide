# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - SDCGroup3

on:
  push:
    branches:
      - 'feature/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix api
          npm install --prefix web

      - name: Run tests
        run: |
          # Run API tests if they exist
          if [ -f "api/package.json" ] && npm run --prefix api test --if-present; then
            echo "API tests completed"
          fi
          
          # Run web tests if they exist
          if [ -f "web/package.json" ] && npm run --prefix web test --if-present; then
            echo "Web tests completed"
          fi
          
          # Run root level tests if they exist
          npm run test --if-present

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: |
          npm install
          npm install --prefix api
          npm install --prefix web

      - name: Build applications
        run: |
          # Build API (if build script exists)
          npm run build --prefix api --if-present
          
          # Build web application
          npm run build --prefix web
          
          # Build root level if script exists
          npm run build --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

