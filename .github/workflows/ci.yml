# .github/workflows/ci.yml

name: CI Pipeline - Frontend Test (Quick)

on: [push, pull_request]

jobs:
  test_frontend:
    runs-on: ubuntu-latest
    
    # ----------------------------------------------------------------
    # 1. ENVIRONMENT VARIABLES (Minimal)
    # ----------------------------------------------------------------
    env:
      # Use a dummy API target since we won't start the real API
      VITE_API_TARGET: http://localhost:5175 
      
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps

      # --- 2. Install Dependencies and Build Frontend (Web directory) ---
      - name: 📦 Install and Build Frontend
        run: |
          cd web
          npm install
          # Optional: Run build to ensure successful compilation
          # npm run build 

      # --- 3. Start Frontend Service (Web) ---
      - name: 🏃 Start Frontend App (on port 5173)
        # We start the dev server in the background
        run: |
          cd web
          npm run dev &
        
      # --- 4. Wait for Frontend ---
      - name: ⏳ Wait for Frontend Endpoint to be Ready
        # Only wait for the frontend port 5173 to be open
        run: npx wait-on tcp:5173 -t 30000 
        
      # --- 5. Run Tests ---
      - name: 🧪 Run Playwright Tests (Frontend/Page Load Check)
        run: |
          cd web
          # Set the base-url to the frontend port for E2E tests
          npx playwright test --base-url=http://localhost:5173
        
      - name: 📝 Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7