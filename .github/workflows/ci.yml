name: E2E Testing Pipeline

on:
  push:
    branches: [ "feature/**", "features/**", "!features/tour" ]
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract feature name from branch
        id: extract-feature
        run: |
          # Extract feature name from branch (e.g., feature/exhibitions -> exhibitions)
          BRANCH_NAME="${{ github.ref_name }}"
          FEATURE_NAME=$(echo "$BRANCH_NAME" | sed 's/feature\///' | sed 's/features\///')
          echo "feature_name=$FEATURE_NAME" >> $GITHUB_OUTPUT
          echo "Running tests for feature folder: $FEATURE_NAME"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install API deps
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Install Web deps
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Build API (for E2E)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npx prisma generate
          npx prisma migrate reset --force --skip-seed
          npx prisma migrate deploy
          node prisma/seed.js
          npm run build

      - name: Install Playwright browsers
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright install --with-deps

      - name: Start API server in background
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 5175
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          NODE_ENV: test
        run: |
          npm start &
          sleep 10
          # Verify API is responding
          curl -f http://localhost:5175/health || curl -f http://localhost:5175/ || echo "API server not responding"

      - name: Run Playwright tests
        working-directory: ${{ env.WEB_DIR }}
        run: |
          FEATURE_FOLDER="tests/e2e/${{ steps.extract-feature.outputs.feature_name }}"
          if [ -d "$FEATURE_FOLDER" ]; then
            echo "Running all tests in folder: $FEATURE_FOLDER"
            npx playwright test "$FEATURE_FOLDER" --workers=8
          else
            echo "Error: Feature folder $FEATURE_FOLDER does not exist"
            exit 1
          fi
        env:
          CI: true
          VITE_API_TARGET: http://localhost:5175

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.WEB_DIR }}/playwright-report/
          retention-days: 7