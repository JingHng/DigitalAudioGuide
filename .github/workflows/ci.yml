# .github/workflows/ci.yml

name: CI Pipeline - Full-Stack Test

on: [push, pull_request]

jobs:
  test_fullstack:
    runs-on: ubuntu-latest
    
    # ----------------------------------------------------------------
    # 1. DATABASE SERVICE SETUP
    # ----------------------------------------------------------------
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: ciuser
          POSTGRES_PASSWORD: cipassword
          POSTGRES_DB: cidatabase
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ----------------------------------------------------------------
    # 2. ENVIRONMENT VARIABLES
    # ----------------------------------------------------------------
    env:
      PORT: 5175
      VITE_API_TARGET: http://localhost:5175
      # Connection string for the API to access the DB service
      DATABASE_URL: postgresql://ciuser:cipassword@localhost:5432/cidatabase
      
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- 3. Install Tools ---
      - name: 📦 Install Global Tools (wait-on)
        run: npm install -g wait-on 

      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps

      # --- 4. Database Schema Setup and Seed Data (API directory) ---
      - name: ⚙️ Setup Database Schema and Seed Data
        run: |
          cd api
          npm install
          
          # 1. Apply test database migrations
          npm run db:migrate:test 
          
          # 2. Seed the database (using direct node execution as confirmed for your JS file)
          echo "Seeding database with initial exhibit data..."
          node prisma/seed.js
          echo "Seeding complete."

      # --- 5. Start Backend Service (API) ---
      - name: 🏃 Build and Start Backend API (on port 5175)
        run: |
          cd api
          
          npm run build 

          # 2. Start the compiled JavaScript server in the background
          node dist/server.js & 
        
      # --- 6. Start Frontend Service (Web) ---
      - name: 🏃 Start Frontend App (on port 5173)
        run: |
          cd web
          npm install
          npm run dev &
      
      # --- 7. Wait for both services ---
      - name: ⏳ Wait for Frontend and API Endpoint to be Ready
        # Waits for the frontend port and for the exhibits API endpoint to return a 200 status
        run: wait-on tcp:5173 http-get://localhost:5175/api/exhibits -t 60000

      # --- 8. Run Tests ---
      - name: 🧪 Run Playwright Tests
        run: |
          cd web
          # Set the base-url to the frontend port for E2E tests
          npx playwright test --base-url=http://localhost:5173
        
      - name: 📝 Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7