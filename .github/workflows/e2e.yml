name: E2E Playwright Tests

# Runs on every push and pull request targeting any branch
on: [push, pull_request]

jobs:
  e2e:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      # Install project dependencies, including 'wait-on' for server stability
      - name: Install dependencies
        run: npm install
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        
      # Build the production version of the React application
      - name: Build application
        run: npm run build
        
      # Start the built application in the background (runs on port 4173 by default)
      - name: Start server (Background process)
        run: npm run preview &
        
      # CRITICAL: Wait for the server at port 5173 to become available
      - name: Wait for server to be ready
        run: npx wait-on http://localhost:5173
        
      # Run all your .spec.ts files now that the server is confirmed running
      - name: Run Playwright tests
        run: npx playwright test
        
      # Upload test artifacts (playwright-report)
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 3