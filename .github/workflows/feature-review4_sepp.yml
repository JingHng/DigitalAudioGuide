# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - SEPP

on:
  push:
    branches:
      - feature/review4
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch: # Allows manual trigger


env:
  WEBAPP_NAME: "SEPP"
  RESOURCE_GROUP: "SEPP"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "deploymentOwen.zip"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_84A0A8933A9E474EA2C48DD60FD23E8B }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_38ABD5A15B8C4D34958B72C192538052 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F2EFF0039A354B81827424EA7CDC9E7B }}


jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_84A0A8933A9E474EA2C48DD60FD23E8B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_38ABD5A15B8C4D34958B72C192538052 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F2EFF0039A354B81827424EA7CDC9E7B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SEPP'
          slot-name: 'Production'
          package: .
          