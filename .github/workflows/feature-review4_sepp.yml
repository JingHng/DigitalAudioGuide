name: Build and deploy Node.js app to Azure Web App - SEPP

on:
  push:
    branches:
      - feature/review4
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  WEBAPP_NAME: "SEPP"
  RESOURCE_GROUP: "SEPP"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "deploymentOwen.zip"

  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}

  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_84A0A8933A9E474EA2C48DD60FD23E8B }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_38ABD5A15B8C4D34958B72C192538052 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F2EFF0039A354B81827424EA7CDC9E7B }}

# ------------------------------------------------------------
# 1️⃣ E2E TEST JOB (SAFE – NO DB RESET)
# ------------------------------------------------------------
jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install API deps
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Install Web deps
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Build API (for E2E)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npm run build

      - name: Install Playwright browsers
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright install --with-deps

      - name: Start API server
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 5175
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          NODE_ENV: test
        run: |
          npm start &
          sleep 10
          curl -f http://localhost:5175/health

      - name: Run Playwright tests
        working-directory: ${{ env.WEB_DIR }}
        env:
          CI: true
          VITE_API_TARGET: http://localhost:5175
        run: npm run e2e

# ------------------------------------------------------------
# 2️⃣ BUILD + PACKAGE JOB
# ------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: e2e

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      # ---- Frontend ----
      - name: Build frontend
        working-directory: ${{ env.WEB_DIR }}
        run: |
          npm ci
          npm run build

      # ---- Backend ----
      - name: Build API (TypeScript → dist)
        working-directory: ${{ env.API_DIR }}
        run: |
          npm ci
          npm run build
          npm prune --production

      # ---- Bundle frontend into backend ----
      - name: Copy web build into api/public
        run: |
          rm -rf api/public
          mkdir -p api/public
          cp -R web/dist/. api/public/

      # ---- Package deployment artifact ----
      - name: Create deployment artifact
        run: |
          cd api
          rm -f ../${ARTIFACT_NAME}
          zip -r ../${ARTIFACT_NAME} \
            dist/ \
            public/ \
            node_modules/ \
            package*.json \
            prisma/
          cd ..
          ls -lh ${ARTIFACT_NAME}

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ env.ARTIFACT_NAME }}

# ------------------------------------------------------------
# 3️⃣ DEPLOY JOB
# ------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ${{ env.ARTIFACT_NAME }}
          clean: true
