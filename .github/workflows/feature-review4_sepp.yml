# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - SEPP

on:
  push:
    branches:
      - feature/review4
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch: # Allows manual trigger


env:
  WEBAPP_NAME: "SEPP"
  RESOURCE_GROUP: "SEPP"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "deploymentOwen.zip"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_84A0A8933A9E474EA2C48DD60FD23E8B }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_38ABD5A15B8C4D34958B72C192538052 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F2EFF0039A354B81827424EA7CDC9E7B }}


jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract feature name from branch
        id: extract-feature
        run: |
          # Extract feature name from branch (e.g., feature/exhibitions -> exhibitions)
          BRANCH_NAME="${{ github.ref_name }}"
          FEATURE_NAME=$(echo "$BRANCH_NAME" | sed 's/feature\///' | sed 's/features\///')
          echo "feature_name=$FEATURE_NAME" >> $GITHUB_OUTPUT
          echo "Running tests for feature folder: $FEATURE_NAME"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install API deps
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Install Web deps
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Build API (for E2E)
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npx prisma generate
          npx prisma migrate reset --force --skip-seed
          npx prisma migrate deploy
          node prisma/seed.js
          npm run build

      - name: Install Playwright browsers
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright install --with-deps

      - name: Start API server in background
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 5175
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          NODE_ENV: test
        run: |
          npm start &
          sleep 10
          # Verify API is responding
          curl -f http://localhost:5175/health || curl -f http://localhost:5175/ || echo "API server not responding"

      - name: Run Playwright tests
        working-directory: ${{ env.WEB_DIR }}
        run: |
          FEATURE_FOLDER="tests/e2e/${{ steps.extract-feature.outputs.feature_name }}"
          if [ -d "$FEATURE_FOLDER" ]; then
            echo "Running all tests in folder: $FEATURE_FOLDER"
            npx playwright test "$FEATURE_FOLDER" --workers=8
          else
            echo "Error: Feature folder $FEATURE_FOLDER does not exist"
            exit 1
          fi
        env:
          CI: true
          VITE_API_TARGET: http://localhost:5175

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.WEB_DIR }}/playwright-report/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: e2e
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_84A0A8933A9E474EA2C48DD60FD23E8B }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_38ABD5A15B8C4D34958B72C192538052 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F2EFF0039A354B81827424EA7CDC9E7B }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SEPP'
          slot-name: 'Production'
          package: .
          