name: Jing Hng's Individual Deployment Branch for Testing Purposes

on:
  push:
    branches:
      - features/tour   # Your main feature branch for deployment
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  WEBAPP_NAME: "JingHngIndividualDeployment"
  RESOURCE_GROUP: "TourFeatureCICD"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "node-app.zip"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7B46095111024D8791ED30AE27C67101 }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8CBFC0120224CEFB0544B06D60F26E4 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A6899D18F6D14443B16B10568C }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ---- Frontend ----
      - name: Install web deps
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Build web
        working-directory: ${{ env.WEB_DIR }}
        run: npm run build

      # ---- Backend ----
      - name: Install api deps (for build)
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Build api (TypeScript -> dist)
        working-directory: ${{ env.API_DIR }}
        run: npm run build

      - name: Prune dev dependencies (keep only production)
        working-directory: ${{ env.API_DIR }}
        run: npm prune --production

      # ---- Bundle web into api/public ----
      - name: Copy web build into api/public
        run: |
          rm -rf "${API_DIR}/public"
          mkdir -p "${API_DIR}/public"
          cp -R "${WEB_DIR}/dist/." "${API_DIR}/public/"

      # ---- Copy API static assets ----
      - name: Copy API static assets
        run: cp -R -u "${API_DIR}/src/public/." "${API_DIR}/public/" || true

      # ---- Prepare for production deployment ----
      - name: Prepare production API
        run: |
          cd "${API_DIR}"
          npm ci --production --ignore-scripts
          rm -rf tests/ *.log coverage/ .git/ .github/ || true

      # ---- Create clean deployment artifact ----
      - name: Package deployment artifact
        run: |
          cd "${API_DIR}"
          rm -f "../${ARTIFACT_NAME}"
          zip -r "../${ARTIFACT_NAME}" node_modules/ package*.json prisma/ public/ src/ *.js web.config generated/ .deployment \
            -x "*.log" "*.test.js" "coverage/*" "node_modules/*/test/*" "node_modules/*/tests/*" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ env.ARTIFACT_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/features/tour'   # Only deploy your branch
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ${{ env.ARTIFACT_NAME }}
          clean: true

      - name: Restart Azure Web App
        run: |
          az webapp restart --name ${{ env.WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}
