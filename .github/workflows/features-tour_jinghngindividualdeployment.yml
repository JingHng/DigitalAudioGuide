# .github/workflows/feature_tour_deployment.yml
name: Jing Hng Individual Deployment - features/tour

on:
  push:
    branches:
      - features/tour
    paths-ignore:
      - "modules/**"
      - "**/*.md"
  workflow_dispatch:

env:
  WEBAPP_NAME: "JingHngIndividualDeployment"
  RESOURCE_GROUP: "TourFeatureCICD"
  NODE_VERSION: "20.x"
  API_DIR: "api"
  WEB_DIR: "web"
  ARTIFACT_NAME: "node-app.zip"
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
  CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7B46095111024D8791ED30AE27C67101 }}
  TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_A8CBFC0120224CEFB0544B06D60F26E4 }}
  SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A6899D18F6D14443B16B10568D09540C }}

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract feature name
        id: extract-feature
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          # Removes 'feature/' or 'features/' prefix
          FEATURE_NAME=$(echo "$BRANCH_NAME" | sed 's/^features\///;s/^feature\///')
          echo "feature_name=$FEATURE_NAME" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ---- Install Dependencies ----
      - name: Install dependencies
        run: |
          cd ${{ env.API_DIR }} && npm ci
          cd ../${{ env.WEB_DIR }} && npm ci

      # ---- Database and API Preparation ----
      - name: Build API and Migrate DB
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          npx prisma generate
          npx prisma migrate reset --force --skip-seed
          npx prisma migrate deploy
          node prisma/seed.js
          npm run build

      - name: Build Web
        working-directory: ${{ env.WEB_DIR }}
        run: npm run build

      # ---- E2E Testing Phase ----
      - name: Start API server in background
        working-directory: ${{ env.API_DIR }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          PORT: 5175
          JWT_SECRET_KEY: ${{ env.JWT_SECRET_KEY }}
          JWT_REFRESH_SECRET: ${{ env.JWT_REFRESH_SECRET }}
          NODE_ENV: test
        run: |
          npm start &
          sleep 10
          curl -f http://localhost:5175/health || echo "API server health check failed"

      - name: Install Playwright browsers
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright install --with-deps

      - name: Run Playwright tests for branch
        working-directory: ${{ env.WEB_DIR }}
        env:
          CI: true
          VITE_API_TARGET: http://localhost:5175
        run: |
          FEATURE_FOLDER="tests/e2e/${{ steps.extract-feature.outputs.feature_name }}"
          if [ -d "$FEATURE_FOLDER" ]; then
            echo "🚀 Running E2E tests in: $FEATURE_FOLDER"
            npx playwright test "$FEATURE_FOLDER" --workers=8
          else
            echo "⚠️ No tests found in $FEATURE_FOLDER, running default tests."
            npx playwright test
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ env.WEB_DIR }}/playwright-report/
          retention-days: 7

      # ---- Bundle and Package ----
      - name: Bundle Web into API Public
        run: |
          echo "📁 Cleaning and preparing API public folder"
          rm -rf "${API_DIR}/public"
          mkdir -p "${API_DIR}/public"
          cp -R "${WEB_DIR}/dist/." "${API_DIR}/public/"
          
          echo "🖼️ Copying API static assets (Images/Audios)"
          cp -R -u -v "${API_DIR}/src/public/." "${API_DIR}/public/" || true

      - name: Prepare Production API
        working-directory: ${{ env.API_DIR }}
        run: |
          npm prune --production
          rm -rf tests/ *.log coverage/ .git/ .github/ || true

      - name: Package deployment artifact
        run: |
          cd "${API_DIR}"
          zip -r "../${ARTIFACT_NAME}" \
            node_modules/ package*.json prisma/ public/ src/ *.js web.config generated/ .deployment \
            -x "*.log" "*.test.js" "coverage/*" "node_modules/*/test/*" "node_modules/*/tests/*"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: ${{ env.ARTIFACT_NAME }}

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    # Ensure it only deploys for feature branches
    if: github.ref_name == 'features/tour' || startsWith(github.ref_name, 'features/')
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package
          path: .

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.CLIENT_ID }}
          tenant-id: ${{ env.TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.WEBAPP_NAME }}
          package: ${{ env.ARTIFACT_NAME }}
          clean: true

      - name: Restart Azure Web App
        run: |
          az webapp restart --name ${{ env.WEBAPP_NAME }} --resource-group ${{ env.RESOURCE_GROUP }}